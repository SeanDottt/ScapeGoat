<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* The Canvas: Matte Black & Fixed */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            height: 100%; width: 100%;
            overflow: hidden; 
            display: flex; flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* The Logo Container - Added Vertical Breathing Room */
        .logo-container {
            padding-top: 8vh; /* Pushes logo down 8% of the screen height */
            padding-bottom: 20px;
            flex-shrink: 0; 
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo {
            width: 85vw; /* Slightly larger for impact */
            max-width: 340px; 
            height: auto;
            border-radius: 18px;
            box-shadow: 0 0 25px rgba(164, 255, 0, 0.45);
        }

        /* The Functional Core - Scrollable inner area */
        .form-container { 
            width: 100%; 
            max-width: 480px; 
            flex-grow: 1;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 10px 20px 80px 20px; /* Padding for the form inside */
            box-sizing: border-box;
        }

        /* Remove JotForm scrollbars for cleaner look */
        .form-container::-webkit-scrollbar {
            display: none;
        }

        iframe {
            width: 100% !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="logo" alt="Kilroy">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260538594946068"></script>
    </div>

</body>
</html>

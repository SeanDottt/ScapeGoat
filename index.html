<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilroy | Access</title>
    <style>
        /* The Canvas: Matte Black & No-Scroll */
        body, html {
            margin: 0; 
            padding: 0;
            background-color: #000000;
            height: 100vh; 
            width: 100vw;
            overflow: hidden; /* Strict: No scrolling */
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* The Kilroy Logo with Lime Glow */
        .logo {
            width: 180px;
            height: auto;
            /* Matches the Lime Green from your image */
            filter: drop-shadow(0 0 15px rgba(164, 255, 0, 0.6));
            margin-bottom: 40px;
        }

        /* The Functional Core */
        .form-container { 
            width: 100%; 
            max-width: 450px; 
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

    <img src="logo.png" class="logo" alt="Kilroy">

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260538594946068"></script>
    </div>

</body>
</html>

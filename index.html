<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilroy | Access</title>
    <style>
        /* 1. The Canvas: Deep Matte Black */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            height: 100vh; width: 100vw;
            overflow: hidden; /* No scrolling */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: -apple-system, sans-serif;
        }

        /* 2. The Kilroy Mark (Sized for your specific upload) */
        .logo {
            width: 320px; /* Slightly larger to show the detail */
            height: auto;
            border-radius: 24px; /* Matches the curve in your image */
            box-shadow: 0 0 25px rgba(164, 255, 0, 0.4); /* Lime Green Glow */
            margin-bottom: 40px;
        }

        /* 3. The Functional Core */
        .form-container { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            justify-content: center; 
        }
    </style>
</head>
<body>

    <img src="logo.png" class="logo" alt="Kilroy">

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260538594946068"></script>
    </div>

</body>
</html>

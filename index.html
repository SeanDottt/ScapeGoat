<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1SYJXQBKTS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1SYJXQBKTS');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* 1. The Canvas: Matte Black & Fixed */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            display: flex; flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 2. Logo Unit - Prestige Positioning */
        .logo-container {
            flex: 0 0 auto;
            padding-top: 80px; 
            padding-bottom: 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo {
            width: 85vw; 
            max-width: 320px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(164, 255, 0, 0.45);
            cursor: pointer;
            transition: transform 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .logo:active {
            transform: scale(0.95);
        }

        /* 3. The Functional Core - JotForm Container */
        .form-container { 
            flex: 1 1 auto;
            width: 100%; 
            max-width: 500px; 
            
            /* THE FIX: Reserve space to prevent layout jump */
            min-height: 600px; 
            
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 0 20px 60px 20px; 
            box-sizing: border-box;
            
            /* Subtle fade-in for high-status entry */
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-container::-webkit-scrollbar { display: none; }

        iframe {
            width: 100% !important;
            border: none !important;
        }

        /* Mobile specific balance */
        @media (max-width: 600px) {
            .logo-container { padding-top: 60px; }
            .logo { max-width: 280px; }
            .form-container { min-height: 500px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" 
             class="logo" 
             alt="Kilroy" 
             onclick="window.location.reload();">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260538594946068"></script>
    </div>

</body>
</html>

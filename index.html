<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* The Canvas: Matte Black & Fixed */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            display: flex; flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Logo Unit - Perfectly Balanced Breathing Room */
        .logo-container {
            flex: 0 0 auto; /* Don't let it shrink */
            padding-top: 60px; /* Strong desktop clearance */
            padding-bottom: 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo {
            width: 85vw; 
            max-width: 320px; /* Caps the size so it doesn't get rowdy on desktop */
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(164, 255, 0, 0.4);
        }

        /* The Functional Core - Fills remaining space */
        .form-container { 
            flex: 1 1 auto;
            width: 100%; 
            max-width: 500px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 0 20px 60px 20px; 
            box-sizing: border-box;
        }

        /* Hide scrollbars for the Terminal aesthetic */
        .form-container::-webkit-scrollbar { display: none; }

        iframe {
            width: 100% !important;
            border: none !important;
        }

        /* Mobile specific tweak */
        @media (max-width: 600px) {
            .logo-container { padding-top: 40px; }
            .logo { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="logo" alt="Kilroy">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260538594946068"></script>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1SYJXQBKTS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1SYJXQBKTS');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* 1. The Canvas: Matte Black & Vertical Freedom */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden; 
            overflow-y: auto;
            display: flex; flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 2. Logo Unit - Prestige Positioning */
        .logo-container {
            flex: 0 0 auto;
            padding-top: 60px; 
            padding-bottom: 40px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo {
            width: 85vw; 
            max-width: 320px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(164, 255, 0, 0.45);
            cursor: pointer;
            transition: transform 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .logo:active {
            transform: scale(0.95);
        }

        /* 3. The Functional Core - Updated to accommodate new form length */
        .form-container { 
            width: 100%; 
            max-width: 550px; 
            min-height: 1200px; 
            padding: 0 20px 100px 20px; 
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        ::-webkit-scrollbar { display: none; }

        iframe {
            width: 100% !important;
            border: none !important;
            background: transparent !important;
        }

        @media (max-width: 600px) {
            .logo-container { padding-top: 40px; }
            .logo { max-width: 260px; }
            .form-container { min-height: 1400px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" 
             class="logo" 
             alt="Kilroy" 
             onclick="window.location.reload();">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260985514278165"></script>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1SYJXQBKTS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1SYJXQBKTS');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* 1. Basic Setup: Let the page be as long as it needs to be */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: block; /* Standard block flow */
            text-align: center;
        }

        /* 2. Logo Unit */
        .logo-container {
            padding-top: 60px; 
            padding-bottom: 20px;
            width: 100%;
        }

        .logo {
            width: 85vw; 
            max-width: 320px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(164, 255, 0, 0.45);
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        /* 3. The Form Container */
        .form-container { 
            width: 100%; 
            max-width: 550px; 
            margin: 0 auto; /* Centers the form */
            padding: 0 20px; 
            box-sizing: border-box;
            min-height: 600px; /* Forces space so page isn't black while loading */
        }

        /* 4. The Footer: Just a standard block at the bottom */
        .footer {
            width: 100%;
            padding: 80px 0; /* Huge space at bottom so errors never reach the button */
            background-color: #000;
        }

        .footer a {
            color: #A4FF00;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px 28px;
            border: 1px solid rgba(164, 255, 0, 0.4);
            border-radius: 50px;
            transition: all 0.4s ease;
            display: inline-block;
            animation: pulseGlow 3s infinite;
        }

        .footer a:hover {
            color: #000;
            background: #A4FF00;
            box-shadow: 0 0 25px rgba(164, 255, 0, 0.6);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(164, 255, 0, 0.1); border-color: rgba(164, 255, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(164, 255, 0, 0.3); border-color: rgba(164, 255, 0, 0.6); }
            100% { box-shadow: 0 0 5px rgba(164, 255, 0, 0.1); border-color: rgba(164, 255, 0, 0.3); }
        }

        /* Cleanup */
        ::-webkit-scrollbar { display: none; }
        iframe { width: 100% !important; border: none !important; }

        @media (max-width: 600px) {
            .logo-container { padding-top: 40px; }
            .logo { max-width: 260px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="logo" alt="Kilroy" onclick="window.location.reload();">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260985514278165"></script>
    </div>

    <footer class="footer">
        <a href="contact.html">Contact Information</a>
    </footer>

</body>
</html>

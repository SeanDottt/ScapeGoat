<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1SYJXQBKTS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1SYJXQBKTS');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            width: 100vw;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .logo-container {
            padding: 60px 0 20px 0;
            flex-shrink: 0;
        }

        .logo {
            width: 85vw; 
            max-width: 320px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(164, 255, 0, 0.45);
        }

        /* 1. We apply a massive bottom padding directly to the container */
        /* 2. !important is required to fight the JotForm resize script */
        .form-container { 
            width: 100%; 
            max-width: 550px; 
            padding: 0 20px 200px 20px !important; 
            box-sizing: border-box;
            flex-grow: 1;
        }

        .footer {
            width: 100%;
            text-align: center;
            padding-bottom: 60px;
            flex-shrink: 0;
            background: #000;
        }

        .footer a {
            color: #A4FF00;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px 28px;
            border: 1px solid rgba(164, 255, 0, 0.4);
            border-radius: 50px;
            display: inline-block;
            transition: all 0.4s ease;
            animation: pulseGlow 3s infinite;
        }

        .footer a:hover {
            color: #000;
            background: #A4FF00;
            box-shadow: 0 0 25px rgba(164, 255, 0, 0.6);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(164, 255, 0, 0.1); border-color: rgba(164, 255, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(164, 255, 0, 0.3); border-color: rgba(164, 255, 0, 0.6); }
            100% { box-shadow: 0 0 5px rgba(164, 255, 0, 0.1); border-color: rgba(164, 255, 0, 0.3); }
        }

        /* Prevent the iframe from breaking the layout */
        iframe { 
            width: 100% !important; 
            border: none !important; 
            display: block !important;
        }

        @media (max-width: 600px) {
            .logo-container { padding-top: 40px; }
            .logo { max-width: 260px; }
            .form-container { padding-bottom: 150px !important; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="logo" alt="Kilroy">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260985514278165"></script>
    </div>

    <footer class="footer">
        <a href="contact.html">Contact Information</a>
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* The Canvas: Matte Black & Fixed */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            height: 100%; width: 100%;
            overflow: hidden; /* Keeps the background still */
            display: flex; flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* The Kilroy Mark - Responsive for Mobile */
        .logo-container {
            padding-top: 20px;
            flex-shrink: 0; /* Prevents logo from squishing */
        }

        .logo {
            width: 80vw; /* Takes up 80% of phone width */
            max-width: 320px; /* Won't get too huge on desktop */
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(164, 255, 0, 0.45);
        }

        /* The Functional Core - Scrollable inner area */
        .form-container { 
            width: 100%; 
            max-width: 450px; 
            flex-grow: 1;
            overflow-y: auto; /* Only the form scrolls */
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iPhone */
            padding-bottom: 50px;
        }

        /* Cleaning up JotForm UI */
        iframe {
            width: 100% !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" class="logo" alt="Kilroy">
    </div>

    <div class="form-container">
        <script type="text/javascript" src="https://form.jotform.com/jsform/260538594946068"></script>
    </div>

</body>
</html>

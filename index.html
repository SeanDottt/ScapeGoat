<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1SYJXQBKTS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1SYJXQBKTS');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Access</title>
    <style>
        /* 1. Body allows for natural scrolling */
        body, html {
            margin: 0; padding: 0;
            background-color: #000000;
            width: 100%;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        /* 2. Main wrapper to keep everything centered and organized */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 100vh; /* Ensures the page is at least full screen */
        }

        /* 3. Logo Unit */
        .logo-container {
            padding-top: 60px; 
            padding-bottom: 20px;
            text-align: center;
        }

        .logo {
            width: 85vw; 
            max-width: 320px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(164, 255, 0, 0.45);
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .logo:active { transform: scale(0.95); }

        /* 4. The Form Container - Standard flow */
        .form-container { 
            width: 100%; 
            max-width: 550px; 
            padding: 0 20px; 
            box-sizing: border-box;
            flex: 1; /* Pushes everything below it down */
        }

        /* 5. The Footer - NO FIXED POSITIONING */
        .footer {
            width: 100%;
            text-align: center;
            padding: 60px 0; /* Large padding so it never feels cramped */
            margin-top: auto; /* Alignment trick for flex containers */
        }

        .footer a {
            color: #A4FF00;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            padding: 14px 28px;
            border: 1px solid rgba(164, 255, 0, 0.4);
            border-radius: 50px;
            transition: all 0.4s ease;
            display: inline-block;
            background: transparent;
            animation: pulseGlow 3s infinite;
        }

        .footer a:hover {
            color: #000;
            background: #A4FF00;
            box-shadow: 0 0 25px rgba(164, 255, 0, 0.6);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(164, 255, 0, 0.1); border-color: rgba(164, 255, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(164, 255, 0, 0.3); border-color: rgba(164, 255, 0, 0.6); }
            100% { box-shadow: 0 0 5px rgba(164, 255, 0, 0.1); border-color: rgba(164, 255, 0, 0.3); }
        }

        ::-webkit-scrollbar { display: none; }
        iframe { width: 100% !important; border: none !important; }

        @media (max-width: 600px) {
            .logo-container { padding-top: 40px; }
            .logo { max-width: 260px; }
            .footer a { font-size: 10px; padding: 12px 22px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-container">
            <img src="logo.png" class="logo" alt="Kilroy" onclick="window.location.reload();">
        </div>

        <div class="form-container">
            <script type="text/javascript" src="https://form.jotform.com/jsform/260985514278165"></script>
        </div>

        <footer class="footer">
            <a href="contact.html">Contact Information</a>
        </footer>
    </div>

</body>
</html>
